name: Build App
on: [push, workflow_dispatch]
env:
  FLET_CLI_NO_RICH_OUTPUT: 1
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # This block caches the Flutter SDK to speed up future runs
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: /Users/runner/Library/Android/sdk
          key: ${{ runner.os }}-flutter-${{ flet-version }}
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true # Enables built-in action caching

      - name: Install Flet
        run: pip install flet

      - name: Build Unsigned App with Icon
        run: yes | flet build ios-simulator --verbose --icon icon.png
        
      - uses: actions/upload-artifact@v4
        with:
          name: my-ios-calculator
          path: build/ios/simulator/*.app
